spring.application.name=backend

# RDS MySQL ?? ??
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:playbit_local_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
