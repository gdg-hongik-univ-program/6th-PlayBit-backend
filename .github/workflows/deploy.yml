name: Spring Boot CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # 1. 빌드 서버 안에 일회용 MySQL 8.0 컨테이너 띄우기
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword # 테스트용 임시 비밀번호
          MYSQL_DATABASE: testdb            # 테스트용 빈 데이터베이스
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: 저장소 코드 불러오기 (Checkout)
        uses: actions/checkout@v3

      - name: JDK 17 설치 (버전에 맞게 수정)
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: gradlew 실행 권한 부여
        run: chmod +x gradlew

      # 2. 스프링 부트 빌드 시 띄워둔 일회용 DB 정보 주입
      - name: Gradle로 빌드 및 테스트 진행
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/testdb
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: testpassword
        run: ./gradlew clean build

      # 3. 빌드된 JAR 파일을 EC2로 전송 (이전과 동일)
      - name: EC2로 파일 전송 (SCP)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          source: "build/libs/*SNAPSHOT.jar"
          target: "/home/ubuntu/app"
          strip_components: 2

      # 4. EC2에서 배포 스크립트 실행 (이전과 동일)
      - name: EC2 배포 스크립트 실행 (SSH)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/app
            ./deploy.sh